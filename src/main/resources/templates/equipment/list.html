<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('设备查询')}"></head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<div class="app-shell">
    <div th:replace="~{fragments :: sidebar('equipment-user')}"></div>
    <main class="content">
        <div class="mb-4">
            <h1 class="h3 mb-1">设备查询</h1>
            <p class="text-muted mb-0">查看可借用设备并提交借用申请。</p>
        </div>
        <div th:replace="~{fragments :: alerts}"></div>

        <section class="page-card mb-4">
            <form class="row g-3 align-items-end" th:action="@{/equipment}" method="get">
                <div class="col-md-4">
                    <label class="form-label">设备名称或编号</label>
                    <input class="form-control" name="keyword" th:value="${keyword}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">分类</label>
                    <select class="form-select" name="categoryId">
                        <option value="">全部分类</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${category.id == categoryId}" th:text="${category.categoryName}"></option>
                    </select>
                </div>
                <div class="col-md-4 form-actions">
                    <a class="btn btn-outline-secondary" th:href="@{/equipment}">清空</a>
                    <button class="btn btn-primary" type="submit">查询</button>
                </div>
            </form>
        </section>

        <section class="page-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>编号</th>
                        <th>设备名称</th>
                        <th>分类</th>
                        <th>型号</th>
                        <th>可借数量</th>
                        <th>位置</th>
                        <th>备注</th>
                        <th class="text-end">申请借用</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="equipment : ${equipmentList}">
                        <td th:text="${equipment.equipmentCode}">EQ-001</td>
                        <td th:text="${equipment.equipmentName}">实验笔记本</td>
                        <td th:text="${equipment.category.categoryName}">计算机设备</td>
                        <td th:text="${equipment.model}">型号</td>
                        <td th:text="${equipment.availableQuantity}">3</td>
                        <td th:text="${equipment.location}">A101</td>
                        <td th:text="${equipment.remark}">备注</td>
                        <td>
                            <form class="row g-2 justify-content-end" th:action="@{/borrow/apply}" method="post">
                                <input type="hidden" name="equipmentId" th:value="${equipment.id}">
                                <div class="col-auto">
                                    <input class="form-control form-control-sm" name="quantity" type="number" min="1" th:max="${equipment.availableQuantity}" value="1" required>
                                </div>
                                <div class="col-auto">
                                    <input class="form-control form-control-sm" name="expectedReturnTime" type="date" required>
                                </div>
                                <div class="col-auto">
                                    <input class="form-control form-control-sm" name="remark" placeholder="备注">
                                </div>
                                <div class="col-auto">
                                    <button class="btn btn-sm btn-primary" type="submit">提交</button>
                                </div>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(equipmentList)}">
                        <td colspan="8" class="text-center text-muted">暂无可借设备</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
