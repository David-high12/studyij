<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('操作日志')}"></head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<div class="app-shell">
    <div th:replace="~{fragments :: sidebar('logs')}"></div>
    <main class="content">
        <div class="mb-4">
            <h1 class="h3 mb-1">操作日志</h1>
            <p class="text-muted mb-0">记录登录、设备维护、借用归还和数据导出等操作。</p>
        </div>

        <section class="page-card mb-4">
            <form class="row g-3 align-items-end" th:action="@{/admin/logs}" method="get">
                <div class="col-md-3">
                    <label class="form-label">操作类型</label>
                    <input class="form-control" name="operationType" th:value="${operationType}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">开始日期</label>
                    <input class="form-control" name="startDate" type="date" th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">结束日期</label>
                    <input class="form-control" name="endDate" type="date" th:value="${endDate}">
                </div>
                <div class="col-md-3 form-actions">
                    <a class="btn btn-outline-secondary" th:href="@{/admin/logs}">清空</a>
                    <button class="btn btn-primary" type="submit">查询</button>
                </div>
            </form>
        </section>

        <section class="page-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>操作用户</th>
                        <th>操作类型</th>
                        <th>操作内容</th>
                        <th>操作时间</th>
                        <th>IP地址</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}">1</td>
                        <td th:text="${log.user == null ? '-' : log.user.realName}">管理员</td>
                        <td th:text="${log.operationType}">用户登录</td>
                        <td th:text="${log.operationContent}">登录系统</td>
                        <td th:text="${#temporals.format(log.operationTime, 'yyyy-MM-dd HH:mm:ss')}">2026-06-12</td>
                        <td th:text="${log.ipAddress}">127.0.0.1</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="6" class="text-center text-muted">暂无日志数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
