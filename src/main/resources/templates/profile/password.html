<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('修改密码')}"></head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<div class="app-shell">
    <div th:replace="~{fragments :: sidebar('password')}"></div>
    <main class="content">
        <div class="mb-4">
            <h1 class="h3 mb-1">修改密码</h1>
            <p class="text-muted mb-0">修改后请使用新密码登录。</p>
        </div>
        <div th:replace="~{fragments :: alerts}"></div>
        <section class="page-card">
            <form th:action="@{/profile/password}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="oldPassword">原密码</label>
                    <input class="form-control" id="oldPassword" name="oldPassword" type="password" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="newPassword">新密码</label>
                    <input class="form-control" id="newPassword" name="newPassword" type="password" minlength="6" required>
                </div>
                <div class="col-12 form-actions">
                    <button class="btn btn-primary" type="submit">保存密码</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
