<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('登录')}"></head>
<body>
<main class="login-shell">
    <section class="login-panel">
        <div class="mb-4">
            <h1 class="h4 fw-bold">高校实验室设备库存与借用管理系统</h1>
            <p class="text-muted mb-0">请输入用户名和密码登录</p>
        </div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="username">用户名</label>
                <input class="form-control" id="username" name="username" th:value="${username}" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">密码</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">登录</button>
        </form>
        <div class="mt-4 small text-muted">
            管理员：admin520 / admin1314<br>
            普通用户：user520 / user1314
        </div>
    </section>
</main>
</body>
</html>
